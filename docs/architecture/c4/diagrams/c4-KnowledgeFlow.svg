 hook.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-29-2" data-look="classic" transform="translate(711.51953125, 179.6328125)"><rect class="basic label-container" style="fill:#438dd5 !important;stroke:#2e6295 !important" x="-112.734375" y="-96.6328125" width="225.46875" height="193.265625"/><g class="label" style="color:#ffffff !important" transform="translate(-82.734375, -81.6328125)"><rect/><foreignObject width="165.46875" height="163.265625"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Phase &amp; Brain Skills</div><div style="font-size: 70%; margin-top: 0px">[Container: Claude Code skills]</div><div style="font-size: 80%; margin-top:10px">The Claude Code skill catalog<br />- forge's agent surface. Each<br />skill is a system prompt +<br />tool policy the engine loads<br />into an SDK query(). Brain<br />skills are the brain's<br />read/write API.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-50-4" data-look="classic" transform="translate(586.6015625, 523.9554290771484)"><path d="M0,15.808823529411764 a107.5,15.808823529411764 0,0,0 215,0 a107.5,15.808823529411764 0,0,0 -215,0 l0,229.76194852941177 a107.5,15.808823529411764 0,0,0 215,0 l0,-229.76194852941177" class="basic label-container outer-path" style="fill:#2f6f9f !important;stroke:#204d6f !important" label-offset-y="15.808823529411764" transform="translate(-107.5, -130.68979779411765)"/><g class="label" style="color:#ffffff !important" transform="translate(-100, -89.4765625)"><rect/><foreignObject width="200" height="198.953125"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Brain (three knowledge graphs)</div><div style="font-size: 70%; margin-top: 0px">[Container: Markdown + graphify graphs]</div><div style="font-size: 80%; margin-top:10px">A Karpathy-style LLM wiki<br />rendered as an Obsidian<br />vault, in three scopes. Each<br />scope has _raw/ (immutable),<br />themes/ (~15-60 line pages),<br />category indexes, and a<br />graphify graph.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>